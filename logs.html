<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WAIS — Activity Logs</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;height:56px;min-height:56px;max-height:56px;padding:0 20px;background:#fff;border-bottom:1px solid #e8e8e8;gap:16px;position:sticky;top:0;z-index:100;overflow:hidden;flex-wrap:nowrap}
.topbar-left{display:flex;align-items:center;gap:0;flex-shrink:0;height:100%}
.topbar-logo{display:block;max-height:36px;width:auto;flex-shrink:0}
.hdr-nav{display:flex;align-items:center;gap:2px;margin-left:8px;padding-left:12px;border-left:1px solid #e8e8e8;flex-wrap:nowrap}
.nav-link{font-size:13px;font-weight:600;color:#888;text-decoration:none;padding:6px 14px;border-radius:7px;transition:all .15s;white-space:nowrap;background:transparent;letter-spacing:.01em}
.nav-link:hover{color:#1a1a2e;background:#f0f0f0}
.nav-link.active{color:#1a1a2e;background:#f0f0f0;position:relative}
.nav-link.active::after{content:'';position:absolute;bottom:2px;left:14px;right:14px;height:2px;background:#23ada7;border-radius:2px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:nowrap;white-space:nowrap}
.topbar-btn{height:32px;padding:0 12px;font-size:12px;font-weight:500;border:1px solid #d0d0d0;border-radius:7px;background:#fff;color:#555;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center}
.topbar-btn:hover{background:#f5f5f5;color:#1a1a2e}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.dot{width:8px;height:8px;border-radius:50%;background:#639922;flex-shrink:0}
.dot.spin{background:#BA7517;animation:pulse 1s infinite}
.dot.err{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Layout ── */
.page{max-width:1300px;margin:0 auto;padding:1.5rem}
.section-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

/* ── Toolbar ── */
.log-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #d8d8d8;border-radius:8px;padding:0 12px;height:36px;width:220px;flex:none}
.search-box input{border:none;outline:none;background:transparent;color:#1a1a2e;font-size:13px;width:100%}
.fb{font-size:12px;padding:4px 12px;border-radius:999px;border:1px solid #d0d0d0;background:#fff;color:#555;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.fb.on{background:#1a1a2e;border-color:#1a1a2e;color:#fff}

/* ── Table ── */
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 220px)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
thead th{position:sticky;top:0;background:#fafafa;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #eee;white-space:nowrap;z-index:1}
tbody td{padding:9px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle;color:#1a1a2e}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f9fffe}

/* ── Action badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap}
.b-login   {background:#EAF3DE;color:#2E7D32}
.b-logout  {background:#f0f0f0;color:#666}
.b-edit    {background:#E6F1FB;color:#185FA5}
.b-new     {background:#EEEDFE;color:#3C3489}
.b-delete  {background:#FEECEC;color:#A32D2D}

/* ── Field diff ── */
.diff-old{color:#A32D2D;text-decoration:line-through;font-size:11px}
.diff-new{color:#2E7D32;font-size:11px}
.diff-arrow{color:#aaa;font-size:10px;margin:0 4px}

/* ── Empty / loading ── */
.empty-row td{text-align:center;padding:3rem;color:#aaa;font-size:13px}

/* ── Count ── */
#log-count{font-size:11px;color:#aaa;padding:8px 12px;border-top:1px solid #f0f0f0;text-align:right}

/* ── Skeleton ── */
.skel{height:12px;border-radius:4px;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;display:inline-block;width:100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#toast.terr{background:#A32D2D}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img class="topbar-logo" src="waislogo2.png" alt="WAIS">
    <nav class="hdr-nav">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="tracker.html">Project Dashboard</a>
      <a class="nav-link" href="map.html">Site Tracker</a>
      <a class="nav-link" href="download.html">Download</a>
      <a class="nav-link active" href="logs.html">&#128203; Logs</a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="sync-pill"><div class="dot" id="sync-dot"></div><span id="sync-lbl">Loading…</span></div>
    <span id="welcome-msg" style="font-size:12px;color:#888"></span>
    <button onclick="loadLogs(true)" class="topbar-btn">&#8635; Refresh</button>
    <button onclick="doLogout()" class="topbar-btn">Logout</button>
  </div>
</div>

<div class="page">
  <div class="section-label">Activity Logs</div>

  <div class="log-toolbar">
    <!-- Search -->
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#aaa" stroke-width="1.3"/><path d="M11 11l3 3" stroke="#aaa" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input id="log-search" placeholder="Search user or site ID…" oninput="applyFilters()"/>
    </div>

    <!-- Action filters -->
    <div id="action-filters" style="display:flex;gap:5px;flex-wrap:wrap">
      <button class="fb on" data-v="all">All</button>
      <button class="fb" data-v="LOGIN">Login</button>
      <button class="fb" data-v="LOGOUT">Logout</button>
      <button class="fb" data-v="NEW SITE">New Site</button>
      <button class="fb" data-v="EDIT">Edit</button>
      <button class="fb" data-v="DELETE">Delete</button>
    </div>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>User</th>
            <th>Action</th>
            <th>Site ID</th>
            <th>Field</th>
            <th>Change</th>
            <th>Browser</th>
          </tr>
        </thead>
        <tbody id="log-tbody">
          <tr class="empty-row"><td colspan="7">Loading logs…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="log-count"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
var GS_URL = 'https://script.google.com/macros/s/AKfycbzdNEzS3t6mnw7wWBxm3UFmHUtz39PWvmpS2BnSnRyvsOuhk6LS1H-V-58nsx25BwEenw/exec';
var CACHE_KEY = 'tsdb_logs_cache';
var CACHE_TTL = 5 * 60 * 1000; // 5 min — logs should be fairly fresh

// ─── Auth guard (admin only) ──────────────────────────────────────────────────
(function(){
  var sess = null;
  try { sess = JSON.parse(sessionStorage.getItem('tsdb_session') || 'null'); } catch(e) {}
  if (!sess || !sess.username) {
    document.body.innerHTML = '';
    window.location.replace('index.html');
    return;
  }
  if (sess.role !== 'admin') {
    document.body.innerHTML = '';
    window.location.replace('index.html');
    return;
  }
  document.getElementById('welcome-msg').textContent = 'Welcome, ' + (sess.display_name || sess.username) + '!';
})();

// ─── State ────────────────────────────────────────────────────────────────────
var ALL_LOGS = [];
var _actionFilter = 'all';

// ─── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function syncDot(state){
  document.getElementById('sync-dot').className='dot'+(state==='spin'?' spin':state==='err'?' err':'');
  document.getElementById('sync-lbl').textContent=state==='spin'?'Loading…':state==='err'?'Error':'Synced';
}
var _toastTimer;
function showToast(msg,isErr){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='show'+(isErr?' terr':'');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){el.className='';},3500);
}
function gsGet(url,params){
  var qs=new URLSearchParams(params).toString();
  return fetch(qs?url+'?'+qs:url,{redirect:'follow'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
  });
}
function fmtDate(v){
  if (!v) return '—';
  var d = new Date(v);
  if (isNaN(d)) return String(v);
  return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function actionBadge(a){
  var cls = a==='LOGIN'?'b-login':a==='LOGOUT'?'b-logout':a==='EDIT'?'b-edit':a==='NEW SITE'?'b-new':a==='DELETE'?'b-delete':'b-logout';
  return '<span class="badge '+cls+'">'+escHtml(a)+'</span>';
}
function shortBrowser(ua){
  if (!ua) return '—';
  if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
  if (ua.includes('Edg')) return 'Edge';
  if (ua.includes('Firefox')) return 'Firefox';
  if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
  if (ua.includes('Mobile')) return 'Mobile';
  return ua.substring(0,30);
}

// ─── Filters ─────────────────────────────────────────────────────────────────
document.getElementById('action-filters').addEventListener('click', function(e){
  var btn = e.target.closest('.fb');
  if (!btn) return;
  document.querySelectorAll('#action-filters .fb').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  _actionFilter = btn.dataset.v;
  applyFilters();
});

function applyFilters(){
  var q = document.getElementById('log-search').value.toLowerCase();
  var filtered = ALL_LOGS.filter(function(r){
    var actionOk = _actionFilter === 'all' || String(r.Action||'') === _actionFilter;
    var searchOk = !q ||
      String(r.User||'').toLowerCase().includes(q) ||
      String(r['Site ID']||'').toLowerCase().includes(q) ||
      String(r.Field||'').toLowerCase().includes(q);
    return actionOk && searchOk;
  });
  renderTable(filtered);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderTable(rows){
  var html = rows.slice(0, 500).map(function(r){
    var change = '';
    if (r['Old Value'] || r['New Value']) {
      change = '<span class="diff-old">'+escHtml(r['Old Value'])+'</span>'+
               '<span class="diff-arrow">→</span>'+
               '<span class="diff-new">'+escHtml(r['New Value'])+'</span>';
    }
    return '<tr>'+
      '<td style="white-space:nowrap;color:#888;font-size:11px">'+escHtml(fmtDate(r.Timestamp))+'</td>'+
      '<td style="font-weight:600">'+escHtml(r.User||'—')+'</td>'+
      '<td>'+actionBadge(r.Action||'')+'</td>'+
      '<td style="font-family:monospace;color:#23ada7;font-weight:600">'+escHtml(r['Site ID']||'—')+'</td>'+
      '<td style="color:#555">'+escHtml(r.Field||'—')+'</td>'+
      '<td>'+change+'</td>'+
      '<td style="color:#aaa;font-size:11px">'+escHtml(shortBrowser(r.Browser||''))+'</td>'+
    '</tr>';
  }).join('');

  document.getElementById('log-tbody').innerHTML = html ||
    '<tr class="empty-row"><td colspan="7">No logs found</td></tr>';
  document.getElementById('log-count').textContent =
    rows.length > 500
      ? 'Showing 500 of ' + rows.length.toLocaleString() + ' entries'
      : rows.length.toLocaleString() + ' entr' + (rows.length === 1 ? 'y' : 'ies');
}

function showSkeleton(){
  var sk = '<tr>'+Array(7).fill('<td><div class="skel"></div></td>').join('')+'</tr>';
  document.getElementById('log-tbody').innerHTML = Array(12).fill(sk).join('');
}

// ─── Load logs ────────────────────────────────────────────────────────────────
async function loadLogs(forceRefresh){
  // Cache check first
  if (!forceRefresh){
    try {
      var cached = JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
      if (cached && cached.ts && (Date.now()-cached.ts)<CACHE_TTL && cached.rows && cached.rows.length){
        ALL_LOGS = cached.rows;
        syncDot('ok');
        document.getElementById('sync-lbl').textContent = 'Cached';
        applyFilters();
        return;
      }
    } catch(e){}
  }

  syncDot('spin');
  showSkeleton();

  try {
    var res = await gsGet(GS_URL, {action:'getLogs'});
    if (res.error) throw new Error(res.error);
    ALL_LOGS = res.rows || [];
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(), rows:ALL_LOGS})); } catch(e){}
    syncDot('ok');
    applyFilters();
  } catch(e){
    syncDot('err');
    showToast('Error loading logs: '+e.message, true);
    document.getElementById('log-tbody').innerHTML = '<tr class="empty-row"><td colspan="7">Failed to load logs</td></tr>';
  }
}

// ─── Logout ───────────────────────────────────────────────────────────────────
function doLogout(){
  if (!confirm('Log out?')) return;
  sessionStorage.removeItem('tsdb_session');
  window.location.replace('index.html');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadLogs();
</script>
</body>
</html>
