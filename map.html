<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>WAIS — Site Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;height:56px;min-height:56px;max-height:56px;padding:0 20px;background:#fff;border-bottom:1px solid #e8e8e8;gap:16px;position:sticky;top:0;z-index:100;overflow:hidden;flex-wrap:nowrap}
.topbar-left{display:flex;align-items:center;gap:0;flex-shrink:0;height:100%}
.topbar-logo{display:block;max-height:36px;width:auto;flex-shrink:0}
.hdr-nav{display:flex;align-items:center;gap:2px;margin-left:8px;padding-left:12px;border-left:1px solid #e8e8e8;flex-wrap:nowrap}
.nav-link{font-size:13px;font-weight:600;color:#888;text-decoration:none;padding:6px 14px;border-radius:7px;transition:all .15s;white-space:nowrap;background:transparent;letter-spacing:.01em}
.nav-link:hover{color:#1a1a2e;background:#f0f0f0}
.nav-link.active{color:#1a1a2e;background:#f0f0f0;position:relative}
.nav-link.active::after{content:'';position:absolute;bottom:2px;left:14px;right:14px;height:2px;background:#23ada7;border-radius:2px}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:nowrap;white-space:nowrap}
.topbar-btn{height:32px;padding:0 12px;font-size:12px;font-weight:500;border:1px solid #d0d0d0;border-radius:7px;background:#fff;color:#555;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}
.topbar-btn:hover{background:#f5f5f5;color:#1a1a2e}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.dot{width:8px;height:8px;border-radius:50%;background:#639922;flex-shrink:0}
.dot.spin{background:#BA7517;animation:pulse 1s infinite}
.dot.err{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.map-strip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:#f5f5f5;border:1px solid #d8d8d8;border-radius:8px;padding:0 12px;height:34px;width:230px;flex:none}
.search-box input{border:none;outline:none;background:transparent;color:#1a1a2e;font-size:13px;width:100%}
.fb{font-size:12px;padding:4px 12px;border-radius:999px;border:1px solid #d0d0d0;background:#fff;color:#555;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.fb.on{background:#23ada7;border-color:#23ada7;color:#fff}
.strip-sep{width:1px;height:24px;background:#e8e8e8;flex-shrink:0;margin:0 2px}
.tbtn{height:34px;padding:0 13px;font-size:12px;font-weight:500;border:1px solid #d0d0d0;border-radius:7px;background:#fff;color:#555;cursor:pointer;white-space:nowrap;transition:all .12s}
.tbtn:hover{background:#f0f0f0}
.tbtn.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.gps-btn{border-color:#1E88E5;color:#1565C0;background:#f0f7ff}
.gps-btn:hover{background:#e0f0ff}
.gps-btn.located{background:#e0f0ff;border-color:#1E88E5;color:#1565C0;font-weight:600}
.nearest-active{background:#FFF3E0;border-color:#E65100;color:#E65100;font-weight:600}
.legend{display:flex;gap:12px;align-items:center;font-size:11px;color:#666;flex-wrap:wrap;margin-left:4px}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
#map-wrap{display:flex;flex-direction:column;height:calc(100vh - 56px)}
#map-outer{position:relative;flex:1;min-height:0;overflow:visible}
#map{position:absolute;inset:0;width:100%;height:100%}
#site-count{position:absolute;bottom:30px;left:14px;z-index:1000;background:rgba(255,255,255,.92);border:1px solid #e0e0e0;border-radius:6px;padding:5px 10px;font-size:11px;color:#555;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.1)}
@keyframes gpsPulse{0%{box-shadow:0 0 0 0 rgba(30,136,229,.55)}70%{box-shadow:0 0 0 10px rgba(30,136,229,0)}100%{box-shadow:0 0 0 0 rgba(30,136,229,0)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#toast.terr{background:#A32D2D}
.kmz-layer-row{display:flex;align-items:center;gap:4px;padding:1px 0}
.kmz-layer-name{font-size:10px;flex:1;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
.kmz-rm-btn{width:15px;height:15px;border:none;background:none;color:#bbb;cursor:pointer;font-size:12px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kmz-rm-btn:hover{color:#c00}
.site-label{background:transparent;border:none;box-shadow:none;padding:0;font-size:9px;font-weight:700;font-family:'Segoe UI',sans-serif;color:#1a1a2e;white-space:nowrap;pointer-events:none}
.site-label::before{display:none}
.nearest-label .leaflet-popup-content-wrapper{background:#fff;border:1.5px solid #E65100;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);padding:0}
.nearest-label .leaflet-popup-content{margin:8px 12px}
.nearest-label .leaflet-popup-tip-container{display:none}

/* ── Mobile drawer ── */
.mob-menu-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid #d0d0d0;border-radius:7px;background:#fff;cursor:pointer;flex-shrink:0;margin-left:auto;padding:0}
.mob-drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2500}
.mob-drawer-bg.open{display:block}
.mob-drawer{position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;z-index:2501;box-shadow:4px 0 20px rgba(0,0,0,.12);transition:left .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;visibility:hidden}
.mob-drawer.open{left:0;visibility:visible}
.mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #f0f0f0}
.mob-drawer-logo{max-height:32px;width:auto}
.mob-drawer-close{border:none;background:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1;padding:4px}
.mob-drawer-nav{display:flex;flex-direction:column;gap:2px;padding:12px 10px;flex:1}
.mob-drawer-nav a{display:block;padding:11px 14px;font-size:14px;font-weight:600;color:#555;text-decoration:none;border-radius:8px;transition:background .15s;position:relative}
.mob-drawer-nav a:hover,.mob-drawer-nav a.active{background:#f0f0f0;color:#1a1a2e}
.mob-drawer-nav a.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:#23ada7;border-radius:2px}
.mob-drawer-footer{padding:14px;border-top:1px solid #f0f0f0;display:flex;flex-direction:column;gap:8px}
.mob-drawer-btn{height:36px;width:100%;border:1px solid #d0d0d0;border-radius:8px;background:#fff;color:#555;font-size:13px;font-weight:500;cursor:pointer}
.mob-drawer-btn.danger{border-color:#f5c2c2;color:#A32D2D}

/* ── Mobile map toolbar FAB ── */
#mob-map-fab{
  display:none;
  position:fixed;
  bottom:calc(20px + env(safe-area-inset-bottom, 0px));
  right:16px;
  z-index:1100;
  width:48px;
  height:48px;
  border-radius:50%;
  background:#1a1a2e;
  border:none;
  box-shadow:0 3px 16px rgba(0,0,0,.3);
  cursor:pointer;
  align-items:center;
  justify-content:center;
  color:#fff;
}
#mob-map-panel-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1199}
#mob-map-panel{display:none;position:fixed;bottom:0;left:0;right:0;z-index:1200;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.15);padding:16px 16px calc(24px + env(safe-area-inset-bottom, 0px));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#mob-map-panel.open{transform:translateY(0)}
.mob-panel-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.mob-panel-section{display:flex;flex-direction:column;gap:10px}
.mob-panel-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.mob-panel-row{display:flex;gap:8px;flex-wrap:wrap}
.mob-panel-sep{border:none;border-top:1px solid #f0f0f0;margin:12px 0}

@media(max-width:768px){
  /* Topbar */
  .topbar{padding:0 14px}
  .hdr-nav{display:none}
  .topbar-right .topbar-btn{display:none}
  .topbar-right .sync-pill{display:none}
  .topbar-right #welcome-msg{display:none}
  .mob-menu-btn{display:flex!important}

  /* Map height accounts for topbar only — strip is hidden */
  #map-wrap{height:calc(100vh - 56px)}
  .map-strip{display:none}

  /* Show FAB only — panel opens on tap */
  #mob-map-fab{display:flex}
  #mob-map-panel{display:block;pointer-events:none}
  #mob-map-panel-bg{display:none}
  /* Site count badge - move up on mobile */
  #site-count{bottom:calc(80px + env(safe-area-inset-bottom, 0px));left:10px;font-size:10px}

  /* Nearest bar - full width, above FAB */
  #nearest-bar{bottom:calc(80px + env(safe-area-inset-bottom, 0px));width:calc(100% - 28px)}
}
#nearest-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  opacity:0;
  z-index:2000;
  background:#fff;
  border:1.5px solid #E65100;
  border-radius:10px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  min-width:280px;
  max-width:440px;
  width:calc(100% - 40px);
  transition:opacity .2s ease, transform .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  font-family:'Segoe UI',sans-serif;
}
#nearest-bar.visible{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.nb-icon{font-size:18px;flex-shrink:0;line-height:1}
.nb-dist{font-size:15px;font-weight:700;color:#E65100;white-space:nowrap;flex-shrink:0}
.nb-divider{width:1px;height:32px;background:#eee;flex-shrink:0}
.nb-info{flex:1;min-width:0}
.nb-site-id{font-size:12px;font-weight:700;color:#23ada7;font-family:monospace}
.nb-site-name{font-size:12px;color:#1a1a2e;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb-meta{font-size:10px;color:#aaa;margin-top:1px}
</style>

<script>
// ─── Auth guard (IIFE so it can't accidentally affect outer scope) ─────────────
(function(){
  var sess = null;
  try { sess = JSON.parse(sessionStorage.getItem('tsdb_session') || 'null'); } catch(e) {}
  if (!sess || !sess.username) {
    document.body.innerHTML = '';          // blank the page immediately
    window.location.replace('index.html');
    return;
  }
  document.getElementById('welcome-msg').textContent = 'Welcome, ' + (sess.display_name || sess.username) + '!';
  var mob = document.getElementById('mob-welcome');
  if (mob) mob.textContent = 'Welcome, ' + (sess.display_name || sess.username) + '!';
})();

// ─── Config ───────────────────────────────────────────────────────────────────
var GS_URL     = 'https://script.google.com/macros/s/AKfycbzdNEzS3t6mnw7wWBxm3UFmHUtz39PWvmpS2BnSnRyvsOuhk6LS1H-V-58nsx25BwEenw/exec';
var KMZ_LAYERS = [{ name: 'VISMIN Sectors', file: 'VisMin_Existing_Sectors_2026_WK16_04202026.kmz' }];
var CACHE_KEY  = 'tsdb_sites_cache';
var CACHE_TTL  = 30 * 60 * 1000;
var TECHS = ['2G','4G','5G'];
var BANDS = ['G900','G1800','L700','L850','L1800','L2100','L2300','L2600','NR700','NR2100','NR2600','NR3500'];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function normStr(v){ return String(v||'').trim().toLowerCase(); }
function isTrue(v){ return v===true||v===1||normStr(v)==='true'||normStr(v)==='1'; }
function isTech(s,t){ return isTrue(s['tech_'+t.toLowerCase()]); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function syncDot(state){
  var cls='dot'+(state==='spin'?' spin':state==='err'?' err':'');
  var txt=state==='spin'?'Loading…':state==='err'?'Error':'Synced';
  document.getElementById('sync-dot').className=cls;
  document.getElementById('sync-lbl').textContent=txt;
  var md=document.getElementById('mob-sync-dot');
  var ml=document.getElementById('mob-sync-lbl');
  if(md) md.className=cls;
  if(ml) ml.textContent=txt;
}
var _toastTimer;
function showToast(msg,isErr){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(isErr?' terr':'');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(function(){el.className='';},3500);
}
function gsGet(url,params){
  var qs=new URLSearchParams(params).toString();
  return fetch(qs?url+'?'+qs:url,{redirect:'follow'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
  });
}

// ─── State ────────────────────────────────────────────────────────────────────
var ALL=[], _markers=[], _techFilter='all', _searchQ='';
var _gpsMarker=null, _gpsCircle=null, _tileLayer=null, _kmzLayers={}, _kmzCounter=0;

// ─── Map — preferCanvas renders thousands of circles without stuttering ───────

// ─── Label zoom threshold ─────────────────────────────────────────────────────
var LABEL_ZOOM = 16;
var _labelTimer = null;

function updateLabels(){
  clearTimeout(_labelTimer);
  _labelTimer = setTimeout(_doUpdateLabels, 150); // debounce — wait for pan/zoom to settle
}

function _doUpdateLabels(){
  var zoom = map.getZoom();
  var showLabels = zoom >= LABEL_ZOOM;
  var bounds = map.getBounds().pad(0.1); // small padding so labels don't pop in at the edge

  _markers.forEach(function(m){
    if(!m.added) return;
    var s = m.site;
    var inView = showLabels && bounds.contains(m.marker.getLatLng());

    if(inView && !m.labelOn){
      m.marker.bindTooltip(escHtml(s.site_id),{
        permanent:true, direction:'top', offset:[0,-7], className:'site-label'
      }).openTooltip();
      m.labelOn = true;
    } else if(!inView && m.labelOn){
      m.marker.unbindTooltip();
      m.labelOn = false;
    }
  });
}

map.on('zoomend moveend', updateLabels);

// ─── Tile toggle ──────────────────────────────────────────────────────────────
function setTile(type){
  if(_tileLayer) map.removeLayer(_tileLayer);
  _tileLayer = type==='satellite'
    ? L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19})
    : L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19});
  _tileLayer.addTo(map);
  // Sync desktop buttons
  document.getElementById('btn-map').classList.toggle('active',type==='map');
  document.getElementById('btn-satellite').classList.toggle('active',type==='satellite');
  // Sync mobile buttons
  var mb = document.getElementById('mob-btn-map');
  var ms = document.getElementById('mob-btn-satellite');
  if(mb) mb.classList.toggle('active',type==='map');
  if(ms) ms.classList.toggle('active',type==='satellite');
}

// ─── Filters & search ────────────────────────────────────────────────────────
function setTechFilter(btn,val){
  // Determine which group the clicked button belongs to
  var isDesktop = !!btn.closest('#tech-filters');
  var isMobile  = !!btn.closest('#mob-tech-filters');
  // Clear both groups and re-apply active to matching value
  document.querySelectorAll('#tech-filters .fb, #mob-tech-filters .fb').forEach(function(b){
    b.classList.remove('on');
  });
  // Highlight the matching button in BOTH groups
  document.querySelectorAll('#tech-filters .fb, #mob-tech-filters .fb').forEach(function(b){
    if(b.textContent.trim() === btn.textContent.trim()) b.classList.add('on');
  });
  _techFilter=val; applyFilters();
}
function onSearch(q){
  _searchQ=q; applyFilters();
  var ql=q.toLowerCase();
  var vis=_markers.filter(function(m){
    return(m.site.site_id||'').toLowerCase().includes(ql)||(m.site.site_name||'').toLowerCase().includes(ql);
  });
  if(vis.length===1){
    var lat=parseFloat(vis[0].site.latitude),lon=parseFloat(vis[0].site.longitude);
    if(!isNaN(lat)&&!isNaN(lon)) map.setView([lat,lon],15);
  }
}
function applyFilters(){
  var q=_searchQ.toLowerCase(); var shown=0;
  _markers.forEach(function(m){
    var s=m.site;
    var ok=(_techFilter==='all'||isTech(s,_techFilter))&&
           (!q||(s.site_id||'').toLowerCase().includes(q)||(s.site_name||'').toLowerCase().includes(q));
    if(ok&&!m.added){map.addLayer(m.marker);m.added=true;}
    if(!ok&&m.added){
      if(m.labelOn){m.marker.unbindTooltip();m.labelOn=false;}
      map.removeLayer(m.marker);m.added=false;
    }
    if(ok) shown++;
  });
  var el=document.getElementById('site-count');
  if(el) el.textContent=shown.toLocaleString()+' site'+(shown!==1?'s':'');
  updateLabels();
}

// ─── Build markers — CircleMarker uses canvas, far less DOM overhead ──────────
function buildMarkers(){
  _markers.forEach(function(m){
    if(m.labelOn){try{m.marker.unbindTooltip();}catch(e){}}
    try{map.removeLayer(m.marker);}catch(e){}
  });
  _markers=[];
  ALL.forEach(function(s){
    var lat=parseFloat(s.latitude),lon=parseFloat(s.longitude);
    if(isNaN(lat)||isNaN(lon)) return;
    var onair=normStr(s.site_status)==='on-air';
    var color=onair?'#2E7D32':'#aaa';
    var techs=TECHS.filter(function(t){return isTech(s,t);});
    var techBadges=techs.map(function(t){
      var clr=t==='2G'?'#3B6D11':t==='4G'?'#3C3489':'#993C1D';
      var bg=t==='2G'?'#EAF3DE':t==='4G'?'#EEEDFE':'#FAECE7';
      return'<span style="font-size:10px;padding:1px 6px;border-radius:999px;font-weight:600;background:'+bg+';color:'+clr+';margin:1px;display:inline-block">'+t+'</span>';
    }).join('');
    var bands=BANDS.filter(function(b){return isTrue(s['band_'+b.toLowerCase()]);});
    var popup=
      '<div style="font-size:12px;font-family:\'Segoe UI\',sans-serif;min-width:190px;line-height:1.7">'+
      '<div style="font-size:13px;font-weight:700;color:#23ada7;font-family:monospace">'+escHtml(s.site_id)+'</div>'+
      '<div style="font-weight:600;color:#1a1a2e;margin-bottom:3px">'+escHtml(s.site_name||'—')+'</div>'+
      '<div style="margin-bottom:3px">'+(onair?'<span style="color:#2E7D32;font-weight:700">&#9679; On-Air</span>':'<span style="color:#C62828;font-weight:700">&#9679; Inactive</span>')+
      (s.site_type?'&nbsp;<span style="color:#888;font-size:11px">'+escHtml(s.site_type)+'</span>':'')+'</div>'+
      (techBadges?'<div style="margin-bottom:3px">'+techBadges+'</div>':'')+
      (bands.length?'<div style="color:#888;font-size:11px;margin-bottom:2px">'+escHtml(bands.join(', '))+'</div>':'')+
      '<div style="color:#aaa;font-size:10px">'+[s.city,s.province].filter(Boolean).map(escHtml).join(', ')+'</div>'+
      '</div>';
    var marker=L.circleMarker([lat,lon],{radius:5,color:'#fff',weight:1.5,fillColor:color,fillOpacity:0.9});
    marker.bindPopup(popup,{maxWidth:240});
    _markers.push({marker:marker,site:s,added:false,labelOn:false});
  });
  applyFilters();
}

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadData(){
  syncDot('spin');
  try{
    var cached=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
    if(cached&&cached.ts&&(Date.now()-cached.ts)<CACHE_TTL&&cached.rows&&cached.rows.length){
      ALL=cached.rows;
      var age=Math.round((Date.now()-cached.ts)/60000);
      syncDot('ok');
      document.getElementById('sync-lbl').textContent='Cached'+(age>0?' · '+age+'m ago':'');
      buildMarkers(); return;
    }
  }catch(e){}
  try{
    var res=await gsGet(GS_URL,{action:'get'});
    if(res.error) throw new Error(res.error);
    ALL=(res.headers&&Array.isArray(res.rows))
      ?res.rows.map(function(r){var o={};res.headers.forEach(function(h,i){o[h]=r[i];});return o;})
      :(res.rows||[]);
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),rows:ALL}));}catch(e){}
    syncDot('ok');
    buildMarkers();
  }catch(e){
    syncDot('err');
    showToast('Load error: '+e.message,true);
  }
}

// ─── GPS realtime tracking ────────────────────────────────────────────────────
var _watchId = null;
var _isTracking = false;
var _firstFix = true;

function locateMe(){
  if(!navigator.geolocation){showToast('Geolocation not supported.',true);return;}
  if(_isTracking){ stopTracking(); return; }
  startTracking();
}

function startTracking(){
  var btn=document.getElementById('gps-btn');
  btn.innerHTML='⏳ Getting fix…'; btn.disabled=true;

  _firstFix = true;

  _watchId = navigator.geolocation.watchPosition(
    function(pos){
      var lat=pos.coords.latitude, lon=pos.coords.longitude, acc=pos.coords.accuracy;

      // Accuracy circle — resize smoothly
      if(_gpsCircle){
        _gpsCircle.setLatLng([lat,lon]);
        _gpsCircle.setRadius(acc);
      } else {
        _gpsCircle=L.circle([lat,lon],{radius:acc,color:'#1565C0',weight:1,fillColor:'#1E88E5',fillOpacity:0.12}).addTo(map);
      }

      // Marker — move smoothly if already placed, otherwise create
      if(_gpsMarker){
        _gpsMarker.setLatLng([lat,lon]);
        // Update popup content with fresh coords
        _gpsMarker.setPopupContent(
          '<div style="font-size:12px;line-height:1.7"><b>&#128205; Your Location</b><br>'+
          'Lat: '+lat.toFixed(6)+'<br>Lon: '+lon.toFixed(6)+'<br>Accuracy: ±'+Math.round(acc)+' m</div>'
        );
      } else {
        var youIcon=L.divIcon({
          className:'',
          html:'<div style="position:relative;width:0;height:0">'+
               '<div style="position:absolute;top:-24px;left:0;transform:translateX(-50%);background:#1565C0;color:#fff;font-size:9px;font-weight:700;font-family:\'Segoe UI\',sans-serif;padding:2px 7px;border-radius:4px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.25)">You are here</div>'+
               '<div style="position:absolute;top:-6px;left:0;transform:translateX(-50%);width:2px;height:9px;background:#1565C0"></div>'+
               '<div style="position:absolute;top:-15px;left:0;transform:translateX(-50%);margin-left:-7px;width:14px;height:14px;border-radius:50%;background:#1E88E5;border:2.5px solid #fff;box-shadow:0 0 0 3px rgba(30,136,229,.3);animation:gpsPulse 1.6s ease-out infinite"></div>'+
               '</div>',
          iconSize:[0,0],iconAnchor:[0,0]
        });
        _gpsMarker=L.marker([lat,lon],{icon:youIcon,zIndexOffset:9000})
          .bindPopup('<div style="font-size:12px;line-height:1.7"><b>&#128205; Your Location</b><br>Lat: '+lat.toFixed(6)+'<br>Lon: '+lon.toFixed(6)+'<br>Accuracy: ±'+Math.round(acc)+' m</div>')
          .addTo(map);
      }

      // Only pan to location on the first fix
      if(_firstFix){
        map.setView([lat,lon],16);
        showToast('Tracking started · ±'+Math.round(acc)+' m accuracy');
        btn.innerHTML='&#128309; Stop Tracking'; btn.disabled=false; btn.classList.add('located');
        _isTracking=true; _firstFix=false;
      }

      // Update nearest site line on every fix
      updateNearest(lat, lon);
    },
    function(err){
      var msg=err.code===1?'Location access denied.':err.code===3?'Request timed out.':'Location unavailable.';
      showToast(msg,true);
      stopTracking();
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:2000}
  );
}

function stopTracking(){
  if(_watchId!==null){ navigator.geolocation.clearWatch(_watchId); _watchId=null; }
  _isTracking=false; _firstFix=true;
  if(_gpsMarker){map.removeLayer(_gpsMarker);_gpsMarker=null;}
  if(_gpsCircle){map.removeLayer(_gpsCircle);_gpsCircle=null;}
  // Also clear nearest site when tracking stops
  _nearestEnabled=false;
  clearNearest();
  var nb=document.getElementById('nearest-btn');
  if(nb){ nb.classList.remove('nearest-active'); nb.innerHTML='&#128279; Nearest Site'; }
  var btn=document.getElementById('gps-btn');
  btn.innerHTML='&#127757; My Location'; btn.disabled=false; btn.classList.remove('located');
  showToast('Location tracking stopped');
}

// ─── KMZ ─────────────────────────────────────────────────────────────────────
function addKmzFromSelect(){
  var sel=document.getElementById('kmz-sel');
  if(!sel||!sel.value){showToast('Select a layer first',true);return;}
  parseAndAddKmz(sel.options[sel.selectedIndex].text,sel.value);
}
async function parseAndAddKmz(name,source){
  if(typeof JSZip==='undefined'){showToast('JSZip not loaded',true);return;}
  if(typeof source==='string'&&window.location.protocol==='file:'){showToast('Cannot fetch files locally.',true);return;}
  showToast('Loading KMZ…');
  try{
    var ab;
    if(source instanceof File){
      ab=await new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(e){res(e.target.result);};fr.onerror=rej;fr.readAsArrayBuffer(source);});
    }else{
      var resp=await fetch(source);
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      ab=await resp.arrayBuffer();
    }
    var zip=await JSZip.loadAsync(ab);
    var kmlEntry=null;
    zip.forEach(function(p,e){if(!kmlEntry&&p.toLowerCase().endsWith('.kml'))kmlEntry=e;});
    if(!kmlEntry) throw new Error('No KML in KMZ');
    var kmlDoc=new DOMParser().parseFromString(await kmlEntry.async('string'),'text/xml');
    var styles={};
    kmlDoc.querySelectorAll('Style[id]').forEach(function(s){
      var lc=s.querySelector('LineStyle color'),pc=s.querySelector('PolyStyle color'),w=s.querySelector('LineStyle width'),f=s.querySelector('PolyStyle fill');
      styles[s.getAttribute('id')]={lineColor:lc?lc.textContent.trim():null,polyColor:pc?pc.textContent.trim():null,width:w?parseFloat(w.textContent)||1:1,fill:f?f.textContent.trim()!=='0':true};
    });
    kmlDoc.querySelectorAll('StyleMap[id]').forEach(function(sm){
      sm.querySelectorAll('Pair').forEach(function(pair){
        var k=pair.querySelector('key'),u=pair.querySelector('styleUrl');
        if(k&&u&&k.textContent.trim()==='normal'){var ref=u.textContent.trim().replace(/^#/,'');if(styles[ref])styles[sm.getAttribute('id')]=styles[ref];}
      });
    });
    function hex(c){if(!c||c.length<8)return{hex:'#3388ff',a:1};var a=parseInt(c.slice(0,2),16)/255,b=parseInt(c.slice(2,4),16),g=parseInt(c.slice(4,6),16),r=parseInt(c.slice(6,8),16);return{hex:'#'+('0'+r.toString(16)).slice(-2)+('0'+g.toString(16)).slice(-2)+('0'+b.toString(16)).slice(-2),a:a};}
    function lls(txt){return txt.trim().split(/\s+/).map(function(c){var p=c.split(',');return[parseFloat(p[1]),parseFloat(p[0])];}).filter(function(ll){return!isNaN(ll[0])&&!isNaN(ll[1]);});}
    var op=0.4,grp=L.featureGroup(),n=0;
    kmlDoc.querySelectorAll('Placemark').forEach(function(pm){
      var su=pm.querySelector('styleUrl'),st=su?(styles[su.textContent.trim().replace(/^#/,'')]||{}):{};
      var lc=hex(st.lineColor),pc=hex(st.polyColor||st.lineColor);
      var vs={color:lc.hex,opacity:lc.a*op,weight:st.width||1,fillColor:pc.hex,fillOpacity:st.fill!==false?pc.a*op*0.55:0};
      pm.querySelectorAll('Polygon').forEach(function(poly){
        var outer=poly.querySelector('outerBoundaryIs LinearRing coordinates');if(!outer)return;
        var rings=[lls(outer.textContent)];
        poly.querySelectorAll('innerBoundaryIs LinearRing coordinates').forEach(function(h){rings.push(lls(h.textContent));});
        if(rings[0].length>1){L.polygon(rings,vs).addTo(grp);n++;}
      });
      pm.querySelectorAll('LineString coordinates').forEach(function(el){var ll=lls(el.textContent);if(ll.length>1){L.polyline(ll,{color:lc.hex,opacity:lc.a*op,weight:st.width||2}).addTo(grp);n++;}});
      pm.querySelectorAll('Point coordinates').forEach(function(el){var p=el.textContent.trim().split(','),la=parseFloat(p[1]),lo=parseFloat(p[0]);if(!isNaN(la)&&!isNaN(lo)){L.circleMarker([la,lo],{radius:4,color:lc.hex,fillColor:lc.hex,fillOpacity:0.85,weight:1,opacity:op}).addTo(grp);n++;}});
    });
    if(!n) throw new Error('No features found in KMZ');
    grp.addTo(map);
    var lid='kmzl-'+(++_kmzCounter);
    _kmzLayers[lid]={layer:grp,visible:true};
    var list=document.getElementById('kmz-list');
    if(list){
      var row=document.createElement('div');row.className='kmz-layer-row';row.id='kmzrow-'+lid;
      row.innerHTML='<input type="checkbox" checked style="accent-color:#23ada7;cursor:pointer" onchange="toggleKmz(\''+lid+'\',this.checked)"><span class="kmz-layer-name">'+escHtml(name)+'</span><button class="kmz-rm-btn" onclick="removeKmz(\''+lid+'\')">&#215;</button>';
      list.appendChild(row);
    }
    showToast('Loaded: '+name+' ('+n+' features)');
  }catch(e){showToast('KMZ error: '+e.message,true);}
}
function toggleKmz(lid,vis){if(!_kmzLayers[lid])return;if(vis)_kmzLayers[lid].layer.addTo(map);else _kmzLayers[lid].layer.remove();}
function removeKmz(lid){if(!_kmzLayers[lid])return;try{_kmzLayers[lid].layer.remove();}catch(e){}delete _kmzLayers[lid];var r=document.getElementById('kmzrow-'+lid);if(r)r.remove();}

// ─── Nearest site ─────────────────────────────────────────────────────────────
var _nearestEnabled = false;
var _nearestLine    = null;
var _nearestMarkerHighlight = null;

function toggleNearest(){
  _nearestEnabled = !_nearestEnabled;
  var btn = document.getElementById('nearest-btn');
  if(_nearestEnabled){
    btn.classList.add('nearest-active');
    btn.innerHTML = '&#128279; Nearest Site';
    // If we already have a GPS fix, draw immediately
    if(_gpsMarker){
      var ll = _gpsMarker.getLatLng();
      updateNearest(ll.lat, ll.lng);
    } else {
      showToast('Enable My Location first to use Nearest Site', true);
      _nearestEnabled = false;
      btn.classList.remove('nearest-active');
    }
  } else {
    btn.classList.remove('nearest-active');
    btn.innerHTML = '&#128279; Nearest Site';
    clearNearest();
  }
}

function haversineKm(lat1,lon1,lat2,lon2){
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateNearest(userLat, userLon){
  if(!_nearestEnabled) return;

  // Find closest visible site
  var best = null, bestDist = Infinity;
  _markers.forEach(function(m){
    if(!m.added) return;
    var ll = m.marker.getLatLng();
    var d = haversineKm(userLat, userLon, ll.lat, ll.lng);
    if(d < bestDist){ bestDist = d; best = m; }
  });
  if(!best) return;

  var sLat = best.marker.getLatLng().lat;
  var sLon = best.marker.getLatLng().lng;
  var distStr = bestDist < 1
    ? Math.round(bestDist*1000)+' m'
    : bestDist.toFixed(2)+' km';

  // Draw / update dashed line
  if(_nearestLine){
    _nearestLine.setLatLngs([[userLat,userLon],[sLat,sLon]]);
  } else {
    _nearestLine = L.polyline([[userLat,userLon],[sLat,sLon]],{
      color:'#E65100', weight:2.5, opacity:0.85,
      dashArray:'6 6', dashOffset:'0'
    }).addTo(map);
  }

  // Orange ring around nearest site
  if(_nearestMarkerHighlight){
    _nearestMarkerHighlight.setLatLng([sLat,sLon]);
  } else {
    _nearestMarkerHighlight = L.circleMarker([sLat,sLon],{
      radius:10, color:'#E65100', weight:2.5,
      fillColor:'transparent', fillOpacity:0, opacity:0.9,
      interactive:false
    }).addTo(map);
  }

  // Update bottom info bar
  var s = best.site;
  var onair = normStr(s.site_status)==='on-air';
  var meta = [
    onair ? '● On-Air' : '● Inactive',
    s.area || '',
    s.vendor || ''
  ].filter(Boolean).join(' · ');

  document.getElementById('nb-dist').textContent    = distStr+' away';
  document.getElementById('nb-site-id').textContent = s.site_id || '—';
  document.getElementById('nb-site-name').textContent = s.site_name || '—';
  document.getElementById('nb-meta').textContent    = meta;
  document.getElementById('nearest-bar').classList.add('visible');
}

function clearNearest(){
  if(_nearestLine)            { map.removeLayer(_nearestLine);            _nearestLine=null; }
  if(_nearestMarkerHighlight) { map.removeLayer(_nearestMarkerHighlight); _nearestMarkerHighlight=null; }
  document.getElementById('nearest-bar').classList.remove('visible');
}
window.addEventListener('beforeunload', function(){
  if(_watchId!==null) navigator.geolocation.clearWatch(_watchId);
});

document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeDrawer();closeMobPanel();}});

// ─── Mobile map panel ─────────────────────────────────────────────────────────
function openMobPanel(){
  var panel = document.getElementById('mob-map-panel');
  var bg = document.getElementById('mob-map-panel-bg');
  panel.classList.add('open');
  panel.style.pointerEvents = 'auto';
  bg.style.display = 'block';
}
function closeMobPanel(){
  var panel = document.getElementById('mob-map-panel');
  var bg = document.getElementById('mob-map-panel-bg');
  panel.classList.remove('open');
  panel.style.pointerEvents = 'none';
  bg.style.display = 'none';
}

// ─── Logout ───────────────────────────────────────────────────────────────────
function doLogout(){
  if (!confirm('Log out?')) return;
  if (_watchId !== null) navigator.geolocation.clearWatch(_watchId);
  sessionStorage.removeItem('tsdb_session');
  window.location.replace('index.html');
}

<script>
// ─── PWA standalone navigation fix ───────────────────────────────────────────
// Keeps all same-origin navigation within the standalone PWA shell on iOS
(function(){
  var isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone) return;
  document.addEventListener('click', function(e){
    var a = e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('tel')) return;
    // Same-origin link — navigate within standalone window
    e.preventDefault();
    window.location.href = href;
  });
})();
</script>
